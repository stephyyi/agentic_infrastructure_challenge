spring:
  application:
    name: chimera

  # Enable Java 21 Virtual Threads for all Spring-managed threads
  # (Tomcat request threads, @Async, @Scheduled — all become VirtualThreads)
  threads:
    virtual:
      enabled: true

  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: public

server:
  port: 8080

# Chimera agent configuration (see specs/technical.md Section 5 — Environment Variables)
chimera:
  agent:
    trend-top-n: ${AGENT_TREND_TOP_N:3}
    cycle-research-timeout-seconds: ${CYCLE_RESEARCH_TIMEOUT_SECONDS:60}
    review-timeout-hours: ${REVIEW_TIMEOUT_HOURS:24}
  llm:
    model-cheap: ${LLM_MODEL_CHEAP:claude-haiku-4-5-20251001}
    model-mid: ${LLM_MODEL_MID:claude-sonnet-4-6}
    model-premium: ${LLM_MODEL_PREMIUM:claude-opus-4-6}
  notification:
    webhook-url: ${NOTIFICATION_WEBHOOK_URL}
