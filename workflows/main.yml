name: Chimera CI

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ main ]

jobs:
  # ─── Job 1: Run failing JUnit 5 tests ───────────────────────────────────────
  test:
    name: JUnit 5 Tests (TDD Red Phase)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Resolve dependencies 
        run: make setup

      - name: Run tests
        # Tests are EXPECTED to fail (TDD red phase).
        # We run them to prove the failing tests exist — the output is the evidence.
        # continue-on-error allows subsequent jobs to run and show the full picture.
        run: make test
        continue-on-error: true

      - name: Upload Surefire test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports/
          if-no-files-found: ignore

  # ─── Job 2: Checkstyle lint ──────────────────────────────────────────────────
  lint:
    name: Checkstyle Lint
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Resolve dependencies
        run: make setup

      - name: Run Checkstyle
        run: make lint

  # ─── Job 3: Spec alignment check ─────────────────────────────────────────────
  spec-check:
    name: Spec Alignment Check
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Make spec_check.sh executable
        run: chmod +x scripts/spec_check.sh

      - name: Run spec alignment check
        run: make spec-check
        # Warnings (unimplemented stories) are expected; hard failures are not.
        continue-on-error: true

      - name: Print spec-check summary
        if: always()
        run: echo "Spec check complete — review output above for gaps."
